<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars Attractions | Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar" style="justify-content: flex-end;">
    <nav class="nav-links">
        <div id="logged-out-nav">
            <a href="#" onclick="showLoginModal()">Log In</a>
            <a href="#" onclick="showLoginModal()">Sign Up</a>
        </div>
        <div id="logged-in-nav" style="display: none; align-items: center; gap: 15px;">
            <span>Welcome, Jedi! 🟢</span>
            <a href="#" onclick="handleLogout()" style="color: #ff4444;">Log Out</a>
        </div>
    </nav>
</header>

<main class="view-page active">
    <div class="hero">
        <h1>STAR WARS</h1>
        <h2>Galactic Attractions</h2>
        <p>Explore Attractions from Disney Parks around the world</p>

        <div class="map-container">
            <div class="image-placeholder map-globe">
                <span>[Globe Image Placeholder]</span>
                <a href="disneyland.html" class="marker ca-marker"></a>
                <a href="disneylandparis.html" class="marker paris-marker"></a>
            </div>
        </div>
    </div>
</main>

<div id="login-modal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-btn" onclick="hideLoginModal()">&times;</span>
        <h2>Welcome to Star Wars Attractions</h2>
        <p style="margin-bottom: 20px;">Log In / Sign Up</p>
        <form onsubmit="event.preventDefault(); handleLogin();">
            <input type="email" placeholder="Email" class="form-input" required>
            <input type="password" placeholder="Password" class="form-input" required>
            <button type="submit" class="yellow-btn full-width" style="margin-top: 10px;">Continue</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
