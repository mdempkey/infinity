services:
  infinity.webapi:
    image: infinity.webapi
    build:
      context: .
      dockerfile: Infinity.WebApi/Dockerfile
    environment:
      - ConnectionStrings__LocationsConnection=Host=db;Database=infinity;Username=postgres;Password=postgres
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - Jwt__Key=DNIIf59TfeNh4kuORVnmrsK7zfk+afWQdzG/6P6j8UA=
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "8081:8081"
    networks:
      - api-net

  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: infinity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    networks:
      - api-net

  infinity.webapp:
    image: infinity.webapp
    build:
      context: .
      dockerfile: Infinity.WebApplication/Dockerfile
    environment:
      - ConnectionStrings__UserConnection=Host=userdb;Database=infinity_users;Username=postgres;Password=postgres
      - InfinityApi__BaseUrl=http://infinity.webapi:8080
      - Mapbox__AccessToken=${MAPBOX_ACCESS_TOKEN}
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - Jwt__Key=DNIIf59TfeNh4kuORVnmrsK7zfk+afWQdzG/6P6j8UA=
    depends_on:
      infinity.webapi:
        condition: service_started
      userdb:
        condition: service_healthy
    ports:
      - "8082:8080"
    networks:
      - api-net
      - webapp-net

  userdb:
    image: postgres:latest
    environment:
      POSTGRES_DB: infinity_users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    networks:
      - webapp-net

networks:
  api-net:
  webapp-net:
