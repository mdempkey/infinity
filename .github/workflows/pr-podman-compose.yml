name: PR Podman Compose

on:
  pull_request:

jobs:
  podman-compose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PODMAN_COMPOSE_PROVIDER: podman-compose
      JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run WebApi tests
        run: dotnet test Infinity.WebApi.Tests/Infinity.WebApi.Tests.csproj --configuration Release

      - name: Run WebApplication tests
        env:
          Mapbox__AccessToken: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: dotnet test Infinity.WebApplication.Tests/Infinity.WebApplication.Tests.csproj --configuration Release

      - name: Install podman-compose
        run: pip install podman-compose

      - name: Build containers
        run: podman compose -f compose.yaml build

      - name: Start stack
        run: podman compose -f compose.yaml up -d

      - name: Verify containers are running
        shell: bash
        run: |
          set -euo pipefail
          sleep 15
          
          podman compose -f compose.yaml ps

          services="$(podman compose -f compose.yaml ps -q)"
          if [ -z "$services" ]; then
            echo "No containers were started by podman compose."
            exit 1
          fi

          failed=0
          for container in $services; do
            state="$(podman inspect --format '{{.State.Status}}' "$container")"
            if [ "$state" != "running" ]; then
              echo "Container $container is not running. State: $state"
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "One or more containers failed to stay up."
            podman compose -f compose.yaml logs
            exit 1
          fi

      - name: Print logs on failure
        if: failure()
        run: podman compose -f compose.yaml logs

      - name: Tear down stack
        if: always()
        run: podman compose -f compose.yaml down -v
